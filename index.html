<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="What If">
  <title>What If Calculator</title>
  <link rel="manifest" href="manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #f2f2f7;
      min-height: 100vh;
      padding: 24px 16px 56px;
    }

    h1 { font-size: 28px; font-weight: 700; color: #1c1c1e; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #8e8e93; }

    .header-row {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 28px;
    }

    .share-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 8px 14px; font-size: 14px; font-weight: 600; color: #007aff;
      background: #fff; border: none; border-radius: 10px;
      cursor: pointer; -webkit-appearance: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      flex-shrink: 0; margin-top: 4px;
    }
    .share-btn:active { opacity: 0.6; }

    .section-title {
      font-size: 12px; font-weight: 600; color: #8e8e93;
      text-transform: uppercase; letter-spacing: 0.6px;
      margin: 0 4px 8px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .grid-2 + .grid-3, .grid-3 + .grid-2 { margin-top: 16px; }

    .field { display: flex; flex-direction: column; }

    .field label {
      font-size: 11px; color: #8e8e93; margin-bottom: 4px;
    }

    .field input {
      font-size: 16px; font-weight: 500; color: #1c1c1e;
      border: none; border-bottom: 1.5px solid #d1d1d6;
      padding: 6px 2px; background: transparent;
      outline: none; width: 100%; -webkit-appearance: none;
    }

    .field input:focus { border-bottom-color: #1c1c1e; }

    /* derived value pill shown next to a label */
    .derived-row {
      display: flex; justify-content: space-between;
      align-items: center; margin-top: 14px;
      padding-top: 12px; border-top: 1px solid #f2f2f7;
    }

    .derived-row .d-label { font-size: 13px; color: #8e8e93; }
    .derived-row .d-value { font-size: 16px; font-weight: 600; color: #1c1c1e; }

    /* What If section */
    .wi-row {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 0; border-bottom: 1px solid #f2f2f7;
    }

    .wi-row:first-child { padding-top: 0; }
    .wi-row:last-of-type { border-bottom: none; padding-bottom: 0; }

    .wi-tag {
      font-size: 12px; font-weight: 700; color: #8e8e93;
      text-transform: uppercase; letter-spacing: 0.4px;
      width: 48px; flex-shrink: 0;
    }

    .wi-row .field { flex: 1; }

    .wi-rev {
      font-size: 16px; font-weight: 600; color: #1c1c1e;
      text-align: right; min-width: 76px; padding-top: 14px;
      flex-shrink: 0;
    }

    .wi-right {
      display: flex; flex-direction: column; align-items: flex-end;
      min-width: 84px; padding-top: 14px; flex-shrink: 0;
    }
    .wi-units { font-size: 15px; font-weight: 600; color: #1c1c1e; }
    .wi-subrev { font-size: 12px; color: #8e8e93; margin-top: 2px; }

    /* balance strip */
    .balance-strip {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 14px; padding-top: 12px; border-top: 1px solid #f2f2f7;
    }

    .balance-strip .bl { font-size: 13px; color: #8e8e93; }
    .balance-strip .bv { font-size: 14px; font-weight: 600; }

    /* Results */
    .results-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }

    .result-box {
      border-radius: 16px; padding: 20px 16px;
      display: flex; flex-direction: column; gap: 4px;
    }

    .result-box.dark { background: #1c1c1e; }
    .result-box.light { background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

    .result-box .rl { font-size: 12px; font-weight: 600; }
    .result-box.dark .rl { color: #8e8e93; }
    .result-box.light .rl { color: #8e8e93; }

    .result-box .rv { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
    .result-box.dark .rv { color: #fff; }
    .result-box.light .rv { color: #1c1c1e; }

    .reset-btn {
      display: block; width: 100%; padding: 14px;
      font-size: 15px; font-weight: 500; color: #8e8e93;
      background: #fff; border: none; border-radius: 12px;
      cursor: pointer; -webkit-appearance: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .reset-btn:active { opacity: 0.6; }

    .green  { color: #34c759; }
    .orange { color: #ff9500; }
    .red    { color: #ff3b30; }
    .muted  { color: #8e8e93; }
  </style>
</head>
<body>

  <div class="header-row">
    <div>
      <h1>What If</h1>
      <p class="subtitle">Revenue projection calculator</p>
    </div>
    <button class="share-btn" onclick="shareResults()" aria-label="Share results">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 6L12 2L16 6"/><line x1="12" y1="2" x2="12" y2="16"/><path d="M4 12v8a1 1 0 001 1h14a1 1 0 001-1v-8"/>
      </svg>
      Share
    </button>
  </div>

  <!-- ── BASELINE ── -->
  <div class="section-title">Baseline</div>
  <div class="card">

    <!-- Row 1: revenue + percentages -->
    <div class="grid-3">
      <div class="field">
        <label>Current Rev ($)</label>
        <input type="number" inputmode="decimal" id="cur_rev" placeholder="0" oninput="calc(); save()">
      </div>
      <div class="field">
        <label>Current % biz</label>
        <input type="number" inputmode="decimal" id="cur_pct" placeholder="0" oninput="calc(); save()">
      </div>
      <div class="field">
        <label>Target % biz</label>
        <input type="number" inputmode="decimal" id="tgt_pct" placeholder="0" oninput="calc(); save()">
        <span style="font-size:11px; color:#8e8e93; margin-top:6px; display:block;">Target Rev</span>
        <span style="font-size:16px; font-weight:600;" id="d_target_rev">—</span>
      </div>
    </div>

    <!-- Row 2: pipeline -->
    <div class="grid-2" style="margin-top:16px;">
      <div class="field">
        <label>Pot Sales</label>
        <input type="number" inputmode="numeric" id="pot_sales" placeholder="0" oninput="calc(); save()">
      </div>
      <div class="field">
        <label>PC Sales</label>
        <input type="number" inputmode="numeric" id="pc_sales" placeholder="0" oninput="calc(); save()">
      </div>
    </div>

    <!-- Derived: Current Hitrate -->
    <div class="derived-row" style="justify-content: flex-start; gap: 10px;">
      <span class="d-label">Current Hitrate</span>
      <span class="d-value" id="d_hitrate">—</span>
    </div>

    <!-- Row 3: avg revenues -->
    <div class="grid-3" style="margin-top:16px;">
      <div class="field">
        <label>1yr Avg ($)</label>
        <input type="number" inputmode="decimal" id="avg1" placeholder="0" oninput="calc(); save()">
      </div>
      <div class="field">
        <label>2yr Avg ($)</label>
        <input type="number" inputmode="decimal" id="avg2" placeholder="0" oninput="calc(); save()">
      </div>
      <div class="field">
        <label>3yr Avg ($)</label>
        <input type="number" inputmode="decimal" id="avg3" placeholder="0" oninput="calc(); save()">
      </div>
    </div>

  </div>

  <!-- ── WHAT IF ── -->
  <div class="section-title">What If</div>
  <div class="card">

    <!-- Hitrate row -->
    <div class="wi-row">
      <span class="wi-tag">Hit %</span>
      <div class="field">
        <label>Hitrate (blank = current)</label>
        <input type="number" inputmode="decimal" id="wi_hitrate" placeholder="—" min="0" max="100" oninput="calc()">
      </div>
      <span class="wi-rev" id="wi_total_sales" style="color:#8e8e93; font-size:14px;">— sales</span>
    </div>

    <!-- 1yr -->
    <div class="wi-row">
      <span class="wi-tag">1yr</span>
      <div class="field">
        <label>% split</label>
        <input type="number" inputmode="decimal" id="pct1" placeholder="0" min="0" max="100" oninput="calc()">
      </div>
      <div class="wi-right">
        <span class="wi-units" id="units1">—</span>
        <span class="wi-subrev" id="sub1">—</span>
      </div>
    </div>

    <!-- 2yr -->
    <div class="wi-row">
      <span class="wi-tag">2yr</span>
      <div class="field">
        <label>% split</label>
        <input type="number" inputmode="decimal" id="pct2" placeholder="0" min="0" max="100" oninput="calc()">
      </div>
      <div class="wi-right">
        <span class="wi-units" id="units2">—</span>
        <span class="wi-subrev" id="sub2">—</span>
      </div>
    </div>

    <!-- 3yr -->
    <div class="wi-row">
      <span class="wi-tag">3yr</span>
      <div class="field">
        <label>% split</label>
        <input type="number" inputmode="decimal" id="pct3" placeholder="0" min="0" max="100" oninput="calc()">
      </div>
      <div class="wi-right">
        <span class="wi-units" id="units3">—</span>
        <span class="wi-subrev" id="sub3">—</span>
      </div>
    </div>

    <!-- Balance -->
    <div class="balance-strip" style="justify-content: flex-start; gap: 10px;">
      <span class="bl">Units check</span>
      <span class="bv muted" id="balance">—</span>
    </div>

  </div>

  <!-- ── RESULTS ── -->
  <div class="results-row">
    <div class="result-box dark">
      <span class="rl">Total Revenue</span>
      <span class="rv" id="total">$0</span>
    </div>
    <div class="result-box light">
      <span class="rl">vs Target</span>
      <span class="rv muted" id="vs_target">—</span>
    </div>
  </div>

  <button class="reset-btn" onclick="resetWhatIf()">Reset What If</button>
  <p style="text-align:center; font-size:11px; color:#c7c7cc; margin-top:12px;">v11</p>

  <script>
    const BASELINE = ['cur_rev','cur_pct','tgt_pct','pot_sales','pc_sales','avg1','avg2','avg3'];
    let _s = {};

    function num(id)  { return parseFloat(document.getElementById(id).value) || 0; }
    function has(id)  { return document.getElementById(id).value.trim() !== ''; }
    function ph(id)   { return parseFloat(document.getElementById(id).placeholder) || 0; }
    function eff(id)  { return has(id) ? num(id) : ph(id); }

    function fmt(n)       { return '$' + Math.round(n).toLocaleString('en-AU'); }
    function fmtPct(n)    { return (n * 100).toFixed(2) + '%'; }
    function fmtSigned(n) {
      return (n >= 0 ? '+' : '−') + '$' + Math.abs(Math.round(n)).toLocaleString('en-AU');
    }

    function calc() {
      // ── Baseline derived values ──
      const curRev  = eff('cur_rev');
      const curPct  = eff('cur_pct') / 100;
      const tgtPct  = eff('tgt_pct') / 100;
      const potSales = eff('pot_sales');
      const pcSales  = eff('pc_sales');
      const avg1 = eff('avg1');
      const avg2 = eff('avg2');
      const avg3 = eff('avg3');

      // Target Rev = (Current Rev / Current %) × Target %
      const targetRev = curPct > 0 ? (curRev / curPct) * tgtPct : 0;
      // Current Hitrate = PC Sales / Pot Sales
      const curHitrate = potSales > 0 ? pcSales / potSales : 0;

      const tRevEl = document.getElementById('d_target_rev');
      tRevEl.textContent = targetRev > 0 ? fmt(targetRev) : '—';
      tRevEl.style.color = (has('cur_rev') && has('cur_pct') && has('tgt_pct')) ? '#1c1c1e' : '#8e8e93';

      const hrEl = document.getElementById('d_hitrate');
      hrEl.textContent = curHitrate > 0 ? fmtPct(curHitrate) : '—';
      hrEl.style.color = (has('pot_sales') && has('pc_sales')) ? '#1c1c1e' : '#8e8e93';

      // ── What If ──
      // Hitrate: use typed value if present, else fall back to current hitrate
      const wiHitrate = has('wi_hitrate') ? num('wi_hitrate') / 100 : curHitrate;
      const totalSalesF = potSales * wiHitrate;          // fractional (e.g. 76.65)
      const totalSalesDisp = totalSalesF > 0
        ? totalSalesF.toFixed(2).replace(/\.00$/, '')
        : '—';

      document.getElementById('wi_total_sales').textContent = totalSalesF > 0
        ? totalSalesDisp + ' sales' : '— sales';

      const pct1 = num('pct1');
      const pct2 = num('pct2');
      const pct3 = num('pct3');

      const units1 = Math.round((pct1 / 100) * totalSalesF);
      const units2 = Math.round((pct2 / 100) * totalSalesF);
      const units3 = Math.round((pct3 / 100) * totalSalesF);

      const sub1  = units1 * avg1;
      const sub2  = units2 * avg2;
      const sub3  = units3 * avg3;
      const total = sub1 + sub2 + sub3;

      function setUnitRow(unitsId, subId, units, rev, active) {
        document.getElementById(unitsId).textContent = active ? units + ' units' : '—';
        document.getElementById(subId).textContent   = active ? fmt(rev) : '—';
      }

      const rowsActive = totalSalesF > 0;
      setUnitRow('units1', 'sub1', units1, sub1, rowsActive);
      setUnitRow('units2', 'sub2', units2, sub2, rowsActive);
      setUnitRow('units3', 'sub3', units3, sub3, rowsActive);
      document.getElementById('total').textContent = fmt(total);

      // Balance: % split check — should sum to 100%
      const balEl = document.getElementById('balance');
      if (totalSalesF === 0) {
        balEl.textContent = '—';
        balEl.className = 'bv muted';
      } else {
        const totalPct = pct1 + pct2 + pct3;
        const rem = 100 - totalPct;
        const remR = Math.round(Math.abs(rem));
        const remStr = remR === 0
          ? totalPct + '% ✓'
          : rem > 0
            ? totalPct + '% / 100%  (' + remR + '% left)'
            : totalPct + '% / 100%  (' + remR + '% over)';
        balEl.textContent = remStr;
        balEl.className = 'bv ' + (remR === 0 ? 'green' : rem > 0 ? 'orange' : 'red');
      }

      // vs Target
      const vsEl = document.getElementById('vs_target');
      const hasAnyReal = BASELINE.some(k => has(k));
      if (!hasAnyReal && total === 0) {
        vsEl.textContent = '—';
        vsEl.className = 'rv muted';
      } else if (targetRev === 0 && total === 0) {
        vsEl.textContent = '—';
        vsEl.className = 'rv muted';
      } else {
        const diff = total - targetRev;
        vsEl.textContent = fmtSigned(diff);
        vsEl.className = 'rv ' + (diff >= 0 ? 'green' : 'red');
      }

      _s = {
        curRev, curPctRaw: eff('cur_pct'), tgtPctRaw: eff('tgt_pct'),
        potSales, pcSales, avg1, avg2, avg3,
        curHitrate, wiHitrate, totalSalesF, targetRev,
        pct1, pct2, pct3, units1, units2, units3,
        sub1, sub2, sub3, total
      };
    }

    function shareResults() {
      const s = _s;
      const wiHrLabel = has('wi_hitrate')
        ? num('wi_hitrate') + '%'
        : (s.curHitrate * 100).toFixed(2) + '% (current)';
      const diff = s.total - s.targetRev;
      const vsTgt = s.targetRev > 0
        ? (diff >= 0 ? '+' : '−') + '$' + Math.abs(Math.round(diff)).toLocaleString('en-AU')
        : '—';

      const text = [
        'What If — Revenue Projection',
        '—'.repeat(30),
        'BASELINE',
        `Current Rev:   ${fmt(s.curRev)}`,
        `Current % biz: ${s.curPctRaw}%   Target % biz: ${s.tgtPctRaw}%`,
        `Target Rev:    ${s.targetRev > 0 ? fmt(s.targetRev) : '—'}`,
        `Pot Sales: ${Math.round(s.potSales)}   PC Sales: ${Math.round(s.pcSales)}   Hitrate: ${(s.curHitrate * 100).toFixed(2)}%`,
        '',
        'WHAT IF',
        `Hitrate: ${wiHrLabel}   →   ${s.totalSalesF > 0 ? s.totalSalesF.toFixed(2) + ' sales' : '—'}`,
        '',
        `1yr  ${s.pct1}%  →  ${s.units1} units  ${fmt(s.sub1)}`,
        `2yr  ${s.pct2}%  →  ${s.units2} units  ${fmt(s.sub2)}`,
        `3yr  ${s.pct3}%  →  ${s.units3} units  ${fmt(s.sub3)}`,
        '',
        `Total Revenue: ${fmt(s.total)}`,
        `vs Target:     ${vsTgt}`,
      ].join('\n');

      if (navigator.share) {
        navigator.share({ title: 'What If — Revenue Projection', text }).catch(() => {});
      } else {
        navigator.clipboard.writeText(text)
          .then(() => alert('Copied to clipboard!'))
          .catch(() => {});
      }
    }

    function save() {
      const s = {};
      BASELINE.forEach(k => { s[k] = document.getElementById(k).value; });
      localStorage.setItem('whatif_v2', JSON.stringify(s));
    }

    function load() {
      try {
        const s = JSON.parse(localStorage.getItem('whatif_v2') || '{}');
        BASELINE.forEach(k => { if (s[k]) document.getElementById(k).value = s[k]; });
      } catch(e) {}
    }

    function resetWhatIf() {
      [...BASELINE, 'wi_hitrate','pct1','pct2','pct3'].forEach(k => {
        document.getElementById(k).value = '';
      });
      localStorage.removeItem('whatif_v2');
      calc();
    }

    load();
    calc();
  </script>
</body>
</html>
